<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gift Box Surprise</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #02374b, #9dccf2);
    overflow: hidden;
}

.hint-container {
    position: absolute;
    top: 20%;
    text-align: center;
    width: 100%;
    animation: bounce 2s infinite;
}

.hint-text {
    font-size: 24px;
    font-weight: bold;
    color: white;
    margin-bottom: 10px;
}

.teddy {
    font-size: 40px;
}

/* Bounce animation */
@keyframes bounce {
    0%, 100% {
        transform: translateY(0);
    }
    50% {
        transform: translateY(-10px);
    }
}

/* Gift Box */
.gift-box {
    width: 150px;
    height: 150px;
    background: #ff4d6d;
    position: relative;
    cursor: pointer;
    border-radius: 10px;
    transition: transform 0.5s;
}

.gift-box:hover {
    transform: scale(1.1);
}

/* Lid */
.lid {
    width: 150px;
    height: 40px;
    background: #c9184a;
    position: absolute;
    top: -40px;
    left: 0;
    border-radius: 10px 10px 0 0;
    transition: transform 0.7s ease;
}

/* Ribbon */
.ribbon {
    width: 20px;
    height: 150px;
    background: gold;
    position: absolute;
    left: 65px;
    top: 0;
}

.ribbon-horizontal {
    width: 150px;
    height: 20px;
    background: gold;
    position: absolute;
    top: 65px;
}

/* Open animation */
.open .lid {
    transform: rotate(-120deg) translateX(-20px);
}

#imageContainer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    display: none;
    flex-direction: column;  
    align-items: center;
    overflow-y: auto;         
    padding: 40px 0;
}

.surprise-img {
    width: 80%;
    max-width: 500px;
    margin-bottom: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.surprise-img:hover {
    transform: scale(1.1);
}

#lightbox {
    display: none;
    position: fixed;
    z-index: 999;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #02374b, #9dccf2);
    justify-content: center;
    align-items: center;
}

#lightboxImg {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
}

#closeBtn {
    position: absolute;
    top: 20px;
    right: 40px;
    font-size: 40px;
    color: white;
    cursor: pointer;
}

/* Confetti */
.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background: red;
    animation: fall 3s linear infinite;
}

@keyframes fall {
    0% {
        transform: translateY(-100vh) rotate(0deg);
    }
    100% {
        transform: translateY(100vh) rotate(360deg);
    }
}
</style>
</head>

<body>

    <div class="hint-container">
    <div class="hint-text">Oreyyy Annnayaaaaw open this now😁😁....!!!</div>
    <div class="teddy">🧸👇</div>
    </div>

<div class="gift-box" id="giftBox">
    <div class="lid"></div>
    <div class="ribbon"></div>
    <div class="ribbon-horizontal"></div>
</div>


<div id="imageContainer">
    <img src="1.jpg" class="surprise-img">
    <img src="2.jpg" class="surprise-img">
</div>

<div id="lightbox">
    <span id="closeBtn">&times;</span>
    <img id="lightboxImg">
</div>

<script>
const giftBox = document.getElementById("giftBox");
const imageContainer = document.getElementById("imageContainer");

giftBox.addEventListener("click", () => {

    // open box
    giftBox.classList.add("open");

    // hide hint
    document.querySelector(".hint-container").style.display = "none";

    // confetti
    for (let i = 0; i < 80; i++) {
        let confetti = document.createElement("div");
        confetti.classList.add("confetti");

        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.backgroundColor =
            `hsl(${Math.random() * 360}, 100%, 50%)`;
        confetti.style.animationDuration =
            (Math.random() * 3 + 2) + "s";

        document.body.appendChild(confetti);

        setTimeout(() => confetti.remove(), 4000);
    }

    // show images
    setTimeout(() => {
        imageContainer.style.display = "flex";
        giftBox.style.display = "none";

        // 🔥 ADD LIGHTBOX FUNCTIONALITY HERE
        const images = document.querySelectorAll(".surprise-img");
        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightboxImg");

        images.forEach(img => {
            img.addEventListener("click", () => {
                lightbox.style.display = "flex";
                lightboxImg.src = img.src;
            });
        });

    }, 1000);
});

// close button
const closeBtn = document.getElementById("closeBtn");
closeBtn.addEventListener("click", () => {
    document.getElementById("lightbox").style.display = "none";
});

// click anywhere to close
const lightbox = document.getElementById("lightbox");
lightbox.addEventListener("click", () => {
    lightbox.style.display = "none";
});
</script>

</body>
</html>
